<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nationwide Bank</title>
<style>
body{font-family:Arial;margin:0;background:#eef3f8}
.login{display:flex;justify-content:center;align-items:center;height:100vh}
.box{background:#fff;padding:30px;border-radius:10px;box-shadow:0 0 15px rgba(0,0,0,0.1)}
input{display:block;margin:10px 0;padding:10px;width:250px}
button{padding:10px;width:100%;background:#0f5ca8;color:#fff;border:none}
#error{color:red;display:none}
.dashboard{display:none;padding:30px}
.balance{background:#0f5ca8;color:#fff;padding:20px;border-radius:10px;margin-bottom:20px}
.details{background:#fff;padding:20px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,0.1)}
</style>
</head>
<body>

<div class="login" id="login">
<div class="box">
<h2>Login</h2>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p id="error">Wrong login</p>
</div>
</div>

<div class="dashboard" id="dash">
<h2>Dashboard</h2>

<div class="balance">
<h3>Available Balance</h3>
<h1>$9,000,000.00</h1>
</div>

<div class="details">
<h3>Account Details</h3>
<p><strong>Account Name:</strong> Marry Muller</p>
<p><strong>Account Number:</strong> **** 4821</p>
<p><strong>Status:</strong> Active</p>
</div>

</div>

<script>
function login(){
let u=document.getElementById('user').value;
let p=document.getElementById('pass').value;

if(u==="Marryluller122" && p==="Muller$forme"){
document.getElementById('login').style.display="none";
document.getElementById('dash').style.display="block";
}else{
document.getElementById('error').style.display="block";
}
}
</script>

</body>
</html>
